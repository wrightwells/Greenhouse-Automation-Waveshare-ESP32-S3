substitutions:
  device_slug: greenhouse_controller
  friendly_name: Greenhouse Controller
  project_name: wrightwells.greenhouse_controller
  project_version: "0.1.0"
  room_name: greenhouse

esphome:
  name: ${device_slug}
  friendly_name: ${friendly_name}
  comment: ESP32-S3 greenhouse environmental control and irrigation controller
  project:
    name: ${project_name}
    version: ${project_version}
  on_boot:
    priority: 800
    then:
      - switch.turn_off: relay_window_open
      - switch.turn_off: relay_window_close
      - switch.turn_off: relay_intake_fan
      - switch.turn_off: relay_exhaust_fan
      - switch.turn_off: relay_irrigation_pump

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

ethernet:
  type: W5500
  clk_pin: GPIO12
  mosi_pin: GPIO11
  miso_pin: GPIO13
  cs_pin: GPIO10
  interrupt_pin: GPIO14
  reset_pin: GPIO9

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: !secret fallback_ap_ssid
    password: !secret fallback_ap_password

captive_portal:

web_server:
  port: 80
  version: 3

time:
  - platform: homeassistant
    id: ha_time

packages:
  base: !include packages/base.yaml

globals:
  - id: manual_mode_active
    type: bool
    restore_value: yes
    initial_value: "false"
  - id: irrigation_fault_active
    type: bool
    restore_value: yes
    initial_value: "false"

switch:
  - platform: gpio
    id: relay_window_open
    name: "${friendly_name} Window Open Relay"
    pin: GPIO1
    restore_mode: ALWAYS_OFF
  - platform: gpio
    id: relay_window_close
    name: "${friendly_name} Window Close Relay"
    pin: GPIO2
    restore_mode: ALWAYS_OFF
  - platform: gpio
    id: relay_intake_fan
    name: "${friendly_name} Intake Fan Relay"
    pin: GPIO3
    restore_mode: ALWAYS_OFF
  - platform: gpio
    id: relay_exhaust_fan
    name: "${friendly_name} Exhaust Fan Relay"
    pin: GPIO4
    restore_mode: ALWAYS_OFF
  - platform: gpio
    id: relay_irrigation_pump
    name: "${friendly_name} Irrigation Pump Relay"
    pin: GPIO5
    restore_mode: ALWAYS_OFF

button:
  - platform: restart
    name: "${friendly_name} Restart"

binary_sensor:
  - platform: status
    name: "${friendly_name} Status"

sensor:
  - platform: wifi_signal
    name: "${friendly_name} Wi-Fi RSSI"
    update_interval: 60s
  - platform: uptime
    name: "${friendly_name} Uptime"

text_sensor:
  - platform: version
    name: "${friendly_name} ESPHome Version"
  - platform: ethernet_info
    ip_address:
      name: "${friendly_name} Ethernet IP"

number:
  - platform: template
    id: ventilation_temp_threshold
    name: "${friendly_name} Ventilation Temperature Threshold"
    optimistic: true
    restore_value: true
    min_value: 15
    max_value: 45
    step: 0.5
    initial_value: 28
  - platform: template
    id: requested_window_position
    name: "${friendly_name} Requested Window Position"
    optimistic: true
    restore_value: true
    min_value: 0
    max_value: 100
    step: 1
    initial_value: 0

script:
  - id: safe_all_outputs_off
    then:
      - switch.turn_off: relay_window_open
      - switch.turn_off: relay_window_close
      - switch.turn_off: relay_intake_fan
      - switch.turn_off: relay_exhaust_fan
      - switch.turn_off: relay_irrigation_pump
