substitutions:
  device_slug: greenhouse_controller
  friendly_name: Greenhouse Controller
  project_name: wrightwells.greenhouse_controller
  project_version: "0.2.0"

esphome:
  name: ${device_slug}
  friendly_name: ${friendly_name}
  comment: ESP32-S3 greenhouse environmental control and irrigation controller
  project:
    name: ${project_name}
    version: ${project_version}
  on_boot:
    priority: 800
    then:
      - script.execute: safe_all_outputs_off
      - lambda: |-
          id(last_failure_reason) = "none";
          id(window_motion_direction) = 0;
          id(window_motion_target) = id(window_position_estimate);
          id(last_motion_update_ms) = millis();

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

preferences:
  flash_write_interval: 1min

logger:

api:
  reboot_timeout: 0s
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password
    on_begin:
      then:
        - lambda: |-
            id(ota_in_progress) = true;
            id(last_failure_reason) = "ota_in_progress";
        - script.execute: safe_all_outputs_off
    on_end:
      then:
        - lambda: |-
            id(ota_in_progress) = false;
            id(last_failure_reason) = "none";

safe_mode:

ethernet:
  type: W5500
  clk_pin: GPIO12
  mosi_pin: GPIO11
  miso_pin: GPIO13
  cs_pin: GPIO10
  interrupt_pin: GPIO14
  reset_pin: GPIO9

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: !secret fallback_ap_ssid
    password: !secret fallback_ap_password

captive_portal:

mqtt:
  broker: !secret mqtt_host
  port: !secret mqtt_port
  username: !secret mqtt_username
  password: !secret mqtt_password
  topic_prefix: !secret mqtt_topic_prefix
  reboot_timeout: 0s
  birth_message:
    topic: ${device_slug}/status
    payload: online
  will_message:
    topic: ${device_slug}/status
    payload: offline

web_server:
  port: 80
  version: 3

time:
  - platform: homeassistant
    id: ha_time

packages:
  sensors: !include packages/sensors.yaml
  control: !include packages/control.yaml
  diagnostics: !include packages/diagnostics.yaml
