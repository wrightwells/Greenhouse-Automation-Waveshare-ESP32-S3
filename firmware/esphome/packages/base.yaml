sensor:
  - platform: dht
    pin: GPIO6
    temperature:
      name: "Greenhouse High Air Temperature"
    humidity:
      name: "Greenhouse High Air Humidity"
    update_interval: 30s
    model: DHT22

  - platform: dht
    pin: GPIO7
    temperature:
      name: "Greenhouse Low Air Temperature"
    humidity:
      name: "Greenhouse Low Air Humidity"
    update_interval: 30s
    model: DHT22

  - platform: dallas_temp
    address: 0x0000000000000000
    name: "Greenhouse Intake Air Temperature"

  - platform: adc
    pin: GPIO8
    name: "Greenhouse Soil Moisture Raw"
    update_interval: 30s
    attenuation: auto

  - platform: pulse_counter
    pin: GPIO15
    name: "Greenhouse Flow Rate Raw"
    update_interval: 10s

one_wire:
  - platform: gpio
    pin: GPIO16

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO17
      mode: INPUT_PULLUP
      inverted: true
    name: "Greenhouse Door State"
