one_wire:
  - platform: gpio
    pin: GPIO16

sensor:
  - platform: dht
    pin: GPIO6
    model: DHT22
    update_interval: 30s
    temperature:
      id: high_air_temperature
      name: "${friendly_name} High Air Temperature"
      device_class: temperature
      state_class: measurement
    humidity:
      id: high_air_humidity
      name: "${friendly_name} High Air Humidity"
      device_class: humidity
      state_class: measurement

  - platform: dht
    pin: GPIO7
    model: DHT22
    update_interval: 30s
    temperature:
      id: low_air_temperature
      name: "${friendly_name} Low Air Temperature"
      device_class: temperature
      state_class: measurement
    humidity:
      id: low_air_humidity
      name: "${friendly_name} Low Air Humidity"
      device_class: humidity
      state_class: measurement

  - platform: dallas_temp
    id: intake_air_temperature
    address: 0x0000000000000000
    name: "${friendly_name} Intake Air Temperature"
    device_class: temperature
    state_class: measurement

  - platform: adc
    id: soil_moisture_raw
    pin: GPIO8
    name: "${friendly_name} Soil Moisture Raw"
    update_interval: 30s
    attenuation: auto
    entity_category: diagnostic

  - platform: template
    id: soil_moisture_percent
    name: "${friendly_name} Soil Moisture"
    unit_of_measurement: "%"
    device_class: moisture
    state_class: measurement
    update_interval: 30s
    lambda: |-
      const float wet = id(soil_moisture_wet_calibration).state;
      const float dry = id(soil_moisture_dry_calibration).state;
      const float span = dry - wet;
      if (span <= 0.01f) {
        return 0.0f;
      }
      float pct = ((dry - id(soil_moisture_raw).state) / span) * 100.0f;
      if (pct < 0.0f) {
        pct = 0.0f;
      }
      if (pct > 100.0f) {
        pct = 100.0f;
      }
      return pct;

  - platform: pulse_counter
    id: flow_pulse_rate
    pin:
      number: GPIO15
      mode: INPUT_PULLUP
    name: "${friendly_name} Flow Pulse Rate"
    update_interval: 10s
    accuracy_decimals: 0
    unit_of_measurement: "pulses/min"
    internal: true

  - platform: template
    id: flow_rate_lpm
    name: "${friendly_name} Flow Rate"
    unit_of_measurement: "L/min"
    icon: mdi:water-pump
    state_class: measurement
    update_interval: 10s
    lambda: |-
      const float pulses_per_litre = id(flow_pulses_per_litre).state;
      if (pulses_per_litre <= 0.1f) {
        return 0.0f;
      }
      return id(flow_pulse_rate).state / pulses_per_litre;

binary_sensor:
  - platform: gpio
    id: door_state
    pin:
      number: GPIO17
      mode: INPUT_PULLUP
      inverted: true
    name: "${friendly_name} Door State"
    device_class: door
